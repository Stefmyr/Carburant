<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#133c55">
    <title>Carburant malin</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #edf6f9;
            --panel: #ffffff;
            --text: #102a43;
            --muted: #557085;
            --line: #cfe1ea;
            --brand: #118ab2;
            --brand-strong: #073b4c;
            --accent: #ffd166;
            --accent-strong: #b7791f;
            --danger: #d62828;
            --success: #06a77d;
            --shadow: 0 16px 34px rgba(7, 59, 76, 0.14);
            --radius: 8px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            -webkit-text-size-adjust: 100%;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at 12% 0%, rgba(255, 209, 102, 0.42), transparent 30%),
                linear-gradient(180deg, #d7f4ff 0%, var(--bg) 42%, #f8fbfc 100%);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        button,
        input,
        select {
            font: inherit;
        }

        .app-header {
            position: sticky;
            top: 0;
            z-index: 5;
            padding: max(14px, env(safe-area-inset-top)) 16px 12px;
            background: rgba(237, 246, 249, 0.92);
            border-bottom: 1px solid var(--line);
            backdrop-filter: blur(14px);
        }

        .header-inner {
            width: min(1120px, 100%);
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.25rem, 5vw, 2rem);
            line-height: 1.15;
            letter-spacing: 0;
            color: var(--brand-strong);
        }

        .status-pill {
            flex: 0 0 auto;
            padding: 8px 12px;
            border-radius: 999px;
            background: var(--brand-strong);
            color: var(--brand-strong);
            color: #fff;
            font-size: 0.82rem;
            font-weight: 700;
            white-space: nowrap;
        }

        main {
            width: min(1120px, 100%);
            margin: 0 auto;
            padding: 16px 16px calc(24px + env(safe-area-inset-bottom));
        }

        .search-panel {
            background: var(--panel);
            border: 2px solid rgba(17, 138, 178, 0.16);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px;
        }

        .field-label {
            display: block;
            margin-bottom: 8px;
            color: var(--muted);
            font-size: 0.88rem;
            font-weight: 700;
        }

        .subline {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 650;
        }

        .search-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
        }

        #codePostalInput {
            width: 100%;
            min-height: 54px;
            padding: 12px 16px;
            border: 2px solid #b9d8e6;
            border-radius: var(--radius);
            background: #f8fdff;
            color: var(--text);
            font-size: 1.18rem;
            font-weight: 850;
            outline: none;
        }

        #codePostalInput:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.14);
        }

        .primary-button {
            min-height: 54px;
            padding: 0 16px;
            border: 0;
            border-radius: var(--radius);
            background: var(--brand-strong);
            color: #fff;
            font-weight: 800;
            cursor: pointer;
            touch-action: manipulation;
        }

        .primary-button:active {
            transform: translateY(1px);
        }

        .quick-picks {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            margin-top: 12px;
            padding-bottom: 2px;
            scrollbar-width: none;
        }

        .quick-picks::-webkit-scrollbar {
            display: none;
        }

        .chip {
            min-height: 40px;
            padding: 0 14px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: #fff;
            color: var(--text);
            font-weight: 700;
            white-space: nowrap;
            cursor: pointer;
            touch-action: manipulation;
        }

        .chip.is-active {
            border-color: var(--brand);
            background: #d8f3ff;
            color: var(--brand-strong);
        }

        .tools-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            align-items: end;
            gap: 10px;
            margin-top: 14px;
        }

        .fuel-buttons {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px;
        }

        .fuel-button {
            min-height: 52px;
            padding: 8px 10px;
            border: 2px solid #cfe1ea;
            border-radius: var(--radius);
            background: #fff;
            color: var(--text);
            font-weight: 900;
            cursor: pointer;
            touch-action: manipulation;
            display: grid;
            align-content: center;
            gap: 2px;
        }

        .fuel-button small {
            color: var(--muted);
            font-size: 0.72rem;
            font-weight: 800;
        }

        .fuel-button.is-active {
            border-color: #073b4c;
            background: var(--accent);
            color: #3a2700;
            box-shadow: 0 10px 20px rgba(255, 209, 102, 0.34);
        }

        .fuel-button.is-active small {
            color: #6b4a00;
        }

        .message {
            margin-top: 14px;
            padding: 12px;
            border-radius: var(--radius);
            border: 1px solid var(--line);
            background: #fff;
            color: var(--muted);
            font-weight: 700;
        }

        .message.error {
            border-color: #fed7aa;
            background: #fff7ed;
            color: var(--danger);
        }

        .results-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin: 18px 0 10px;
        }

        .results-title {
            margin: 0;
            font-size: 1.02rem;
        }

        .results-title strong {
            color: var(--brand);
        }

        .updated-at {
            color: var(--muted);
            font-size: 0.84rem;
            text-align: right;
        }

        .cards {
            display: grid;
            gap: 12px;
        }

        .station-card {
            background: var(--panel);
            border: 1px solid rgba(17, 138, 178, 0.18);
            border-radius: var(--radius);
            box-shadow: 0 10px 24px rgba(7, 59, 76, 0.10);
            padding: 14px;
            position: relative;
            overflow: hidden;
        }

        .station-card::before {
            content: "";
            position: absolute;
            inset: 0 0 auto;
            height: 5px;
            background: linear-gradient(90deg, #118ab2, #06a77d, #ffd166);
        }

        .station-top {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: start;
        }

        .station-address {
            display: inline-block;
            color: var(--brand-strong);
            font-weight: 850;
            line-height: 1.25;
            text-decoration: none;
        }

        .station-city {
            margin-top: 4px;
            color: var(--muted);
            font-size: 0.92rem;
            text-transform: capitalize;
        }

        .map-link {
            min-height: 40px;
            padding: 10px 12px;
            border-radius: var(--radius);
            background: #fff4c8;
            color: #6b4a00;
            font-size: 0.9rem;
            font-weight: 850;
            text-decoration: none;
            white-space: nowrap;
        }

        .prices {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px;
            margin-top: 14px;
        }

        .prices.is-filtered {
            grid-template-columns: minmax(0, 1fr);
        }

        .price-box {
            min-width: 0;
            padding: 12px;
            border-radius: var(--radius);
            background: #f7fcff;
            border: 1px solid #d5e9f2;
        }

        .fuel-name {
            display: block;
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .fuel-price {
            display: block;
            margin-top: 3px;
            color: var(--success);
            font-size: 1.28rem;
            font-weight: 900;
            line-height: 1.1;
        }

        .fuel-date {
            display: block;
            margin-top: 5px;
            color: var(--muted);
            font-size: 0.75rem;
            line-height: 1.2;
        }

        .desktop-table {
            display: none;
            margin-top: 14px;
            overflow-x: auto;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1020px;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid var(--line);
            text-align: left;
            vertical-align: top;
        }

        th {
            background: #f8fafc;
            color: #344054;
            font-size: 0.86rem;
            user-select: none;
        }

        td {
            font-size: 0.92rem;
        }

        .table-address {
            color: var(--brand-strong);
            font-weight: 800;
            text-decoration: none;
        }

        .table-price {
            color: var(--brand-strong);
            font-weight: 900;
            white-space: nowrap;
        }

        .empty {
            padding: 22px 14px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            color: var(--muted);
            text-align: center;
            font-weight: 700;
        }

        @media (min-width: 760px) {
            main {
                padding-top: 24px;
            }

            .search-panel {
                padding: 18px;
            }

            .cards {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (min-width: 980px) {
            .cards {
                display: none;
            }

            .desktop-table {
                display: block;
            }
        }

        @media (max-width: 430px) {
            .header-inner,
            .results-bar,
            .station-top,
            .tools-row {
                grid-template-columns: 1fr;
            }

            .header-inner,
            .results-bar {
                display: grid;
                align-items: start;
            }

            .status-pill,
            .updated-at {
                justify-self: start;
                text-align: left;
            }

            .search-row {
                grid-template-columns: 1fr;
            }

            .primary-button {
                width: 100%;
            }

            .map-link {
                justify-self: start;
            }

            .fuel-buttons {
                grid-template-columns: 1fr;
            }

            .prices {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="header-inner">
            <div>
                <h1>Carburant malin</h1>
                <p class="subline">Les prix utiles, vite lisibles.</p>
            </div>
            <div class="status-pill" id="statusPill">France</div>
        </div>
    </header>

    <main>
        <section class="search-panel" aria-label="Recherche par code postal ou commune">
            <label class="field-label" for="codePostalInput">Code postal ou commune</label>
            <form class="search-row" id="searchForm">
                <input id="codePostalInput" name="codePostal" type="search" autocomplete="postal-code" placeholder="Ex. 19100 ou Brive">
                <button class="primary-button" type="submit">Rechercher</button>
            </form>

            <div class="quick-picks" id="quickPicks" aria-label="Codes postaux favoris"></div>

            <div class="tools-row">
                <div>
                    <span class="field-label">Carburant le moins cher</span>
                    <div class="fuel-buttons" id="fuelButtons" aria-label="Choix du carburant">
                        <button class="fuel-button" type="button" data-fuel="gazole_prix">Gazole <small>moins cher</small></button>
                        <button class="fuel-button" type="button" data-fuel="e10_prix">E10 <small>moins cher</small></button>
                        <button class="fuel-button" type="button" data-fuel="sp95_prix">SP95 <small>moins cher</small></button>
                        <button class="fuel-button" type="button" data-fuel="e85_prix">E85 <small>moins cher</small></button>
                    </div>
                </div>
            </div>
        </section>

        <div id="message" class="message" hidden></div>

        <section aria-live="polite">
            <div class="results-bar" id="resultsBar" hidden>
                <h2 class="results-title" id="resultsTitle"></h2>
                <div class="updated-at" id="updatedAt"></div>
            </div>
            <div class="cards" id="cards"></div>
            <div class="desktop-table" id="tableWrap"></div>
        </section>
    </main>

    <script>
        const API_URL = 'https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records';
        const defaultPlaces = [
            { cp: '19100', label: 'Brive' },
            { cp: '19360', label: 'Malemort' },
            { cp: '19000', label: 'Tulle' },
            { cp: '87000', label: 'Limoges' }
        ];

        const input = document.getElementById('codePostalInput');
        const form = document.getElementById('searchForm');
        const quickPicks = document.getElementById('quickPicks');
        const fuelButtons = document.getElementById('fuelButtons');
        const message = document.getElementById('message');
        const statusPill = document.getElementById('statusPill');
        const resultsBar = document.getElementById('resultsBar');
        const resultsTitle = document.getElementById('resultsTitle');
        const updatedAt = document.getElementById('updatedAt');
        const cards = document.getElementById('cards');
        const tableWrap = document.getElementById('tableWrap');

        let currentCodePostal = localStorage.getItem('carburant.codePostal') || '19100';
        let currentSearchLabel = localStorage.getItem('carburant.searchLabel') || currentCodePostal;
        let selectedFuelField = '';
        let stations = [];

        const fuels = {
            gazole_prix: { name: 'Gazole', priceField: 'gazole_prix', dateField: 'gazole_maj' },
            e10_prix: { name: 'E10', priceField: 'e10_prix', dateField: 'e10_maj' },
            sp95_prix: { name: 'SP95', priceField: 'sp95_prix', dateField: 'sp95_maj' },
            e85_prix: { name: 'E85', priceField: 'e85_prix', dateField: 'e85_maj' }
        };

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            })[char]);
        }

        function normalizeText(value) {
            const text = String(value || '').toLowerCase();
            return text.charAt(0).toUpperCase() + text.slice(1);
        }

        function price(value) {
            return Number.isFinite(value) ? `${value.toFixed(3)} €` : 'N/A';
        }

        function compactDate(value) {
            if (!value) return 'N/A';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return 'N/A';
            return date.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' });
        }

        function fullDate(value) {
            if (!value) return 'N/A';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return 'N/A';
            return date.toLocaleString('fr-FR', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function mapsUrl(station) {
            const query = `${station.adresse || ''} ${station.cp || ''} ${station.ville || ''}`.trim();
            return `https://www.google.com/maps/search/${encodeURIComponent(query)}`;
        }

        function normalizeCommune(value) {
            return String(value || '')
                .trim()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/[’']/g, ' ')
                .replace(/-/g, ' ')
                .replace(/\s+/g, ' ')
                .toUpperCase();
        }

        function whereForSearch(value) {
            const query = String(value || '').trim();
            if (/^\d{5}$/.test(query)) {
                return {
                    label: query,
                    where: `cp="${query}"`
                };
            }

            const commune = normalizeCommune(query).replace(/"/g, '\\"');
            return {
                label: query,
                where: `search(ville, "${commune}")`
            };
        }

        function showMessage(text, type = 'info') {
            message.textContent = text;
            message.className = `message${type === 'error' ? ' error' : ''}`;
            message.hidden = false;
        }

        function hideMessage() {
            message.hidden = true;
        }

        function sortedStations() {
            if (!selectedFuelField) return [...stations];

            const sorted = stations
                .filter(station => Number.isFinite(station[selectedFuelField]))
                .sort((a, b) => {
                const valueA = a[selectedFuelField];
                const valueB = b[selectedFuelField];

                if (valueA > valueB) return 1;
                if (valueA < valueB) return -1;
                return 0;
            });
            return sorted;
        }

        function selectedFuel() {
            return fuels[selectedFuelField] || null;
        }

        function fuelBoxes(station) {
            const fuelList = selectedFuel() ? [selectedFuel()] : Object.values(fuels);
            return fuelList.map(fuel => `
                <div class="price-box">
                    <span class="fuel-name">${fuel.name}</span>
                    <span class="fuel-price">${price(station[fuel.priceField])}</span>
                    <span class="fuel-date">Maj ${compactDate(station[fuel.dateField])}</span>
                </div>
            `).join('');
        }

        function renderQuickPicks() {
            quickPicks.innerHTML = defaultPlaces.map(place => `
                <button class="chip${place.cp === currentCodePostal ? ' is-active' : ''}" type="button" data-cp="${place.cp}">
                    ${place.cp} ${escapeHtml(place.label)}
                </button>
            `).join('');
        }

        function renderFuelButtons() {
            fuelButtons.querySelectorAll('[data-fuel]').forEach(button => {
                const isActive = button.dataset.fuel === selectedFuelField;
                button.classList.toggle('is-active', isActive);
                button.setAttribute('aria-pressed', String(isActive));
            });
        }

        function renderCards(list) {
            cards.innerHTML = list.map(station => `
                <article class="station-card">
                    <div class="station-top">
                        <div>
                            <a class="station-address" href="${mapsUrl(station)}" target="_blank" rel="noopener">
                                ${escapeHtml(normalizeText(station.adresse || 'Adresse non renseignée'))}
                            </a>
                            <div class="station-city">${escapeHtml(normalizeText(station.ville || ''))} ${escapeHtml(station.cp || '')}</div>
                        </div>
                        <a class="map-link" href="${mapsUrl(station)}" target="_blank" rel="noopener">Itinéraire</a>
                    </div>
                    <div class="prices${selectedFuel() ? ' is-filtered' : ''}">
                        ${fuelBoxes(station)}
                    </div>
                </article>
            `).join('');
        }

        function renderTable(list) {
            const fuel = selectedFuel();
            const fuelHeaders = fuel
                ? `<th>${fuel.name}</th><th>Maj ${fuel.name}</th>`
                : '<th>Gazole</th><th>Maj gazole</th><th>E10</th><th>Maj E10</th><th>SP95</th><th>Maj SP95</th><th>E85</th><th>Maj E85</th>';
            const fuelCells = station => fuel
                ? `<td class="table-price">${price(station[fuel.priceField])}</td><td>${fullDate(station[fuel.dateField])}</td>`
                : `
                    <td class="table-price">${price(station.gazole_prix)}</td>
                    <td>${fullDate(station.gazole_maj)}</td>
                    <td class="table-price">${price(station.e10_prix)}</td>
                    <td>${fullDate(station.e10_maj)}</td>
                    <td class="table-price">${price(station.sp95_prix)}</td>
                    <td>${fullDate(station.sp95_maj)}</td>
                    <td class="table-price">${price(station.e85_prix)}</td>
                    <td>${fullDate(station.e85_maj)}</td>
                `;

            tableWrap.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Adresse</th>
                            <th>Ville</th>
                            ${fuelHeaders}
                        </tr>
                    </thead>
                    <tbody>
                        ${list.map(station => `
                            <tr>
                                <td><a class="table-address" href="${mapsUrl(station)}" target="_blank" rel="noopener">${escapeHtml(normalizeText(station.adresse || 'Adresse non renseignée'))}</a></td>
                                <td>${escapeHtml(normalizeText(station.ville || ''))}</td>
                                ${fuelCells(station)}
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function renderResults() {
            const list = sortedStations();
            const fuel = selectedFuel();
            renderQuickPicks();
            renderFuelButtons();
            resultsBar.hidden = false;
            resultsTitle.innerHTML = `<strong>${list.length}</strong> station${list.length > 1 ? 's' : ''} pour ${escapeHtml(currentSearchLabel)}${fuel ? ` - ${fuel.name}` : ''}`;
            updatedAt.textContent = `Recherche ${new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })}`;

            if (!list.length) {
                cards.innerHTML = `<div class="empty">${fuel ? `Aucun prix ${fuel.name} disponible pour ce code postal.` : 'Aucune station trouvée pour ce code postal.'}</div>`;
                tableWrap.innerHTML = '';
                return;
            }

            renderCards(list);
            renderTable(list);
        }

        async function fetchPrices(searchValue) {
            const search = whereForSearch(searchValue);
            currentCodePostal = /^\d{5}$/.test(search.label) ? search.label : '';
            currentSearchLabel = search.label;
            input.value = search.label;
            localStorage.setItem('carburant.codePostal', currentCodePostal || search.label);
            localStorage.setItem('carburant.searchLabel', search.label);
            renderQuickPicks();
            showMessage('Chargement des prix...');
            statusPill.textContent = search.label;

            const params = new URLSearchParams({
                where: search.where,
                limit: '40'
            });

            try {
                const response = await fetch(`${API_URL}?${params.toString()}`);
                if (!response.ok) throw new Error(`service indisponible (${response.status})`);

                const data = await response.json();
                stations = Array.isArray(data.results) ? data.results : [];
                hideMessage();
                renderResults();
            } catch (error) {
                stations = [];
                resultsBar.hidden = true;
                cards.innerHTML = '';
                tableWrap.innerHTML = '';
                showMessage(`Impossible de récupérer les prix : ${error.message}.`, 'error');
            }
        }

        form.addEventListener('submit', event => {
            event.preventDefault();
            const searchValue = input.value.trim();
            if (searchValue.length < 2) {
                showMessage('Entre un code postal ou une commune.', 'error');
                input.focus();
                return;
            }
            fetchPrices(searchValue);
        });

        input.addEventListener('input', () => {
            const value = input.value.trim();
            if (/^\d{5}$/.test(value)) {
                fetchPrices(value);
            }
        });

        quickPicks.addEventListener('click', event => {
            const button = event.target.closest('[data-cp]');
            if (button) fetchPrices(button.dataset.cp);
        });

        fuelButtons.addEventListener('click', event => {
            const button = event.target.closest('[data-fuel]');
            if (!button) return;
            selectedFuelField = selectedFuelField === button.dataset.fuel ? '' : button.dataset.fuel;
            renderResults();
        });

        input.value = currentSearchLabel;
        renderQuickPicks();
        renderFuelButtons();
        fetchPrices(currentSearchLabel);
    </script>
</body>
</html>
